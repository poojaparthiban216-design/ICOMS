<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadambaas - Manage Users</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #FFF9F6; }
        .orange-header { background: linear-gradient(90deg, #E31E24 0%, #FF5F1F 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0,0,0,0.06); }
        @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        .row-enter { animation: fadeIn 0.2s ease; }
    </style>
</head>
<body class="min-h-screen pb-10">

    <header class="orange-header px-8 py-4 flex justify-between items-center text-white shadow-lg">
        <div class="flex items-center gap-3">
            <a href="admin.html" class="bg-white/20 p-2 rounded-lg hover:bg-white/30 transition">←</a>
            <div class="bg-white/20 p-2 rounded-lg">👤</div>
            <h1 class="font-bold text-xl tracking-tighter">KADAMBAAS</h1>
        </div>
        <span class="text-sm bg-white/20 px-3 py-1 rounded-full">User Management</span>
    </header>

    <main class="max-w-5xl mx-auto p-6 space-y-6">

        <!-- Add User Form -->
        <div class="bg-white p-8 rounded-3xl card-shadow border border-gray-100">
            <h2 class="text-xl font-bold text-gray-800 mb-1">Add New Employee</h2>
            <p class="text-sm text-gray-400 mb-5">Default password will be set to <code class="bg-gray-100 px-2 py-0.5 rounded text-gray-600">Kadambaas@123</code></p>

            <!-- BUG FIX: form now has an id and the submit handler calls the API -->
            <form id="addUserForm" class="grid grid-cols-1 md:grid-cols-4 gap-4" onsubmit="createUser(event)">
                <input type="text"  id="newName"  placeholder="Full Name"   required
                       class="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-400 bg-gray-50">
                <input type="email" id="newEmail" placeholder="Email"       required
                       class="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-400 bg-gray-50">
                <select id="newRole" class="p-3 border border-gray-200 rounded-xl outline-none focus:ring-2 focus:ring-orange-400 bg-gray-50">
                    <option value="Admin">Admin</option>
                    <option value="Supervisor">Supervisor</option>
                    <option value="Dispatcher">Dispatcher</option>
                    <option value="Driver">Driver</option>
                    <option value="Client">Client</option>
                </select>
                <button type="submit" id="create-btn"
                        class="bg-gradient-to-r from-[#E31E24] to-[#FF5F1F] text-white font-bold py-3 rounded-xl hover:opacity-90 transition-all">
                    + Create User
                </button>
            </form>
            <p id="form-error"   class="text-red-500   text-sm mt-3 hidden font-medium"></p>
            <p id="form-success" class="text-green-600 text-sm mt-3 hidden font-medium"></p>
        </div>

        <!-- User Table -->
        <div class="bg-white rounded-3xl card-shadow border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 flex items-center justify-between">
                <h3 class="font-bold text-gray-700">All Employees</h3>
                <span id="user-count" class="bg-gray-100 text-gray-500 text-xs font-bold px-3 py-1 rounded-full">Loading…</span>
            </div>
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b border-gray-100 text-[10px] text-gray-400 uppercase font-bold tracking-widest">
                    <tr>
                        <th class="px-6 py-4">Name</th>
                        <th class="px-6 py-4">Email</th>
                        <th class="px-6 py-4">Role</th>
                        <th class="px-6 py-4">Status</th>
                        <th class="px-6 py-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="userTableBody">
                    <tr><td colspan="5" class="px-6 py-10 text-center text-gray-300 animate-pulse">
                        Fetching from database…
                    </td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // ── Create user — BUG FIX: previously no submit handler existed ──
        async function createUser(event) {
            event.preventDefault();
            const name   = document.getElementById('newName').value.trim();
            const email  = document.getElementById('newEmail').value.trim();
            const role   = document.getElementById('newRole').value;
            const errEl  = document.getElementById('form-error');
            const okEl   = document.getElementById('form-success');
            const btn    = document.getElementById('create-btn');

            errEl.classList.add('hidden');
            okEl.classList.add('hidden');
            btn.disabled = true;
            btn.textContent = 'Creating…';

            try {
                const res  = await fetch('https://icoms.onrender.com/api/users', {
                    method:  'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body:    JSON.stringify({ name, email, role })
                });
                const data = await res.json();

                if (!res.ok) {
                    errEl.textContent = data.error || 'Failed to create user.';
                    errEl.classList.remove('hidden');
                } else {
                    okEl.textContent = `✅ User created! Default password: Kadambaas@123`;
                    okEl.classList.remove('hidden');
                    document.getElementById('addUserForm').reset();
                    fetchUsers();
                }
            } catch (err) {
                errEl.textContent = 'Cannot connect to server. Is it running?';
                errEl.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = '+ Create User';
            }
        }

        // ── Delete user — BUG FIX: button previously called nothing ──
        async function deleteUser(userId, userName) {
            if (!confirm(`Delete user "${userName}"? This cannot be undone.`)) return;
            try {
                const res = await fetch(`https://icoms.onrender.com/api/users/${userId}`, { method: 'DELETE' });
                if (res.ok) {
                    fetchUsers();
                } else {
                    alert('Delete failed. The user may have related records.');
                }
            } catch (err) {
                alert('Cannot connect to server: ' + err.message);
            }
        }

        // ── Fetch and render all users ─────────────────────────────
        async function fetchUsers() {
            try {
                const res   = await fetch('https://icoms.onrender.com/api/users');
                const users = await res.json();
                const tbody = document.getElementById('userTableBody');
                const count = document.getElementById('user-count');

                count.textContent = `${users.length} employee${users.length !== 1 ? 's' : ''}`;

                if (users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">No users found.</td></tr>';
                    return;
                }

                tbody.innerHTML = users.map(u => `
                    <tr class="row-enter border-b border-gray-50 hover:bg-orange-50/30 transition">
                        <td class="px-6 py-4 font-semibold text-gray-800">${u.name}</td>
                        <td class="px-6 py-4 text-gray-500 text-sm">${u.email}</td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs font-bold ${getRoleClass(u.role_name)}">
                                ${u.role_name || '—'}
                            </span>
                        </td>
                        <td class="px-6 py-4">
                            <span class="px-3 py-1 rounded-full text-xs font-semibold ${u.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-500'}">
                                ${u.status || 'Active'}
                            </span>
                        </td>
                        <td class="px-6 py-4 text-right">
                            <button onclick="deleteUser(${u.user_id}, '${u.name.replace(/'/g, "\\'")}')"
                                    class="text-red-400 hover:text-red-600 font-semibold text-sm transition">
                                🗑 Delete
                            </button>
                        </td>
                    </tr>
                `).join('');
            } catch (err) {
                document.getElementById('userTableBody').innerHTML = `
                    <tr><td colspan="5" class="px-6 py-10 text-center text-red-400 font-medium">
                        ⚠ Cannot reach server. Make sure <code>node server.js</code> is running.
                    </td></tr>`;
            }
        }

        function getRoleClass(role) {
            if (role === 'Admin')      return 'bg-blue-100 text-blue-700';
            if (role === 'Supervisor') return 'bg-purple-100 text-purple-700';
            if (role === 'Dispatcher') return 'bg-cyan-100 text-cyan-700';
            if (role === 'Driver')     return 'bg-orange-100 text-orange-700';
            if (role === 'Client')     return 'bg-emerald-100 text-emerald-700';
            return 'bg-gray-100 text-gray-600';
        }

        // ── Auth guard & init ──────────────────────────────────────
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('role') !== 'Admin') {
                alert('Access Denied');
                window.location.href = 'login.html';
                return;
            }
            fetchUsers();
        });
    </script>
</body>
</html>

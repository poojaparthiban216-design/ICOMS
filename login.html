<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kadambaas - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .branding-orange { color: #FF4500; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col items-center py-12">

    <div class="text-center mb-8">
        <h1 class="text-5xl font-black branding-orange tracking-widest uppercase italic">KADAMBAAS</h1>
        <p class="text-gray-500 mt-2 font-medium">Premium Catering Services</p>
    </div>

    <div class="w-full max-w-md mb-[-50px] z-10 px-4">
        <img src="https://images.unsplash.com/photo-1555244162-803834f70033?auto=format&fit=crop&q=80&w=800"
             class="rounded-3xl shadow-2xl h-48 w-full object-cover">
    </div>

    <div class="bg-white pt-16 pb-10 px-10 rounded-[2rem] shadow-sm w-full max-w-md border border-gray-100">
        <h2 class="text-3xl font-bold text-center text-gray-800 mb-8">Welcome Back</h2>

        <form id="loginForm" class="space-y-6">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">Username</label>
                <input type="text" id="username" required
                       class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none"
                       placeholder="Enter username">
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-2">Password</label>
                <input type="password" id="password" required
                       class="block w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 outline-none"
                       placeholder="Enter password">
            </div>

            <p id="message" class="text-red-500 text-sm text-center hidden font-medium"></p>

            <button type="submit"
                    class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl shadow-lg transition-all transform active:scale-95">
                Sign In
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
